<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brickanta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@300;400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brick-bg': '#FCFBF8',
              'brick-navy': '#151A22',
              'brick-coral': '#E94D35'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              serif: ['Merriweather', 'serif']
            }
          }
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body class="bg-brick-bg text-brick-navy font-sans antialiased min-h-screen selection:bg-brick-coral selection:text-white">
    <div id="root"></div>
  </body>
</html>
